name: Release ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP file
        run: |
          zip -r "河津重工部品素材セット.zip" \
            運転台 \
            屋根上機器 \
            床下機器 \
            台車 \
            連結器 \
            photo.png \
            README.md \
            README.en.md \
            README.kr.md \
            README.zh.md \
            .gitignore

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: "河津重工部品素材セット.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
